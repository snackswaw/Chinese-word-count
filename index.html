<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字数统计·Word Count</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f4f9ff 0%, #e6eff8 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.2rem;
        }
        .card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            box-shadow: 0 30px 50px -20px rgba(0, 40, 60, 0.3);
            padding: 2rem 2rem 2.2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        /* 语言切换栏 */
        .lang-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.8rem;
            margin-bottom: 1.2rem;
            background: #eaf1f8c0;
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            justify-content: flex-end;
            align-items: center;
            border: 1px solid #cdddee;
        }
        .lang-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #1f4a6e;
            font-weight: 500;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .lang-btn.active {
            background: #1e3f5c;
            color: white;
            box-shadow: 0 4px 10px #1e3f5c60;
            border-color: #9ac0da;
        }
        .lang-btn:hover {
            background: #c9ddef;
            border-color: #97b9d4;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 620;
            margin: 0 0 0.2rem 0;
            background: linear-gradient(145deg, #183c58, #2a6085);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subhead {
            font-size: 1rem;
            color: #2b5570;
            margin-bottom: 1.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed #b3cbdf;
            transition: opacity 0.1s;
        }
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        .textarea-wrapper {
            background: #ffffffd6;
            border-radius: 2rem;
            box-shadow: inset 0 2px 8px rgba(0,20,30,0.08), 0 5px 12px rgba(18, 52, 77, 0.1);
            padding: 0.5rem;
        }
        textarea {
            width: 100%;
            height: 220px;
            padding: 1.2rem 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
            border: none;
            background: transparent;
            border-radius: 1.8rem;
            resize: vertical;
            outline: none;
            color: #11212e;
            caret-color: #2b6c9e;
        }
        textarea::placeholder {
            color: #96adc2;
            font-style: italic;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.9rem;
        }
        .stat-tile {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.2rem 0.4rem;
            text-align: center;
            box-shadow: 0 8px 18px -8px rgba(33, 68, 92, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        .tile-label {
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #4d6278;
            margin-bottom: 0.4rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .tile-number {
            font-size: 2.3rem;
            font-weight: 600;
            line-height: 1.2;
            color: #113946;
        }
        .tile-unit {
            font-size: 0.8rem;
            color: #7c8f9e;
            margin-left: 2px;
        }
        .total-section {
            background: #1e3c5c;
            border-radius: 2rem;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 14px 25px -10px #1a3349;
            border: 1px solid #9ab8d4;
        }
        .total-label {
            font-size: 1.3rem;
            font-weight: 500;
            color: #eaf3fc;
        }
        .total-value {
            font-size: 2.8rem;
            font-weight: 700;
            background: #ffffff1a;
            padding: 0.2rem 1.8rem;
            border-radius: 3rem;
            color: white;
            border: 1px solid #ffffff4d;
        }
        .separator-detail {
            background: #e4edf5;
            border-radius: 2rem;
            padding: 1.3rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 2.5rem;
            align-items: center;
            border: 1px solid #c4d7e8;
        }
        .detail-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .detail-badge {
            background: white;
            border-radius: 3rem;
            padding: 0.3rem 1rem 0.3rem 1.3rem;
            box-shadow: 0 4px 12px #b7cedf66;
            font-size: 1.1rem;
        }
        .detail-badge span {
            font-weight: 650;
            color: #1a4356;
            margin-right: 0.4rem;
        }
        .small-note {
            font-size: 0.85rem;
            color: #34657f;
            background: #d2e5f5;
            padding: 0.2rem 0.8rem;
            border-radius: 3rem;
        }
        .footnote {
            text-align: right;
            font-size: 0.85rem;
            color: #4a708b;
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reset-btn {
            background: none;
            border: 1.5px solid #9bb6cc;
            color: #2a4b68;
            font-size: 0.9rem;
            padding: 0.2rem 1.4rem;
            border-radius: 3rem;
            cursor: pointer;
        }
        .reset-btn:hover {
            background: #ffffffb3;
        }
        /* 语言切换过渡 */
        .translate-item {
            transition: all 0.1s;
        }
        @media (max-width: 680px) {
            .stat-grid {
                grid-template-columns: repeat(2,1fr);
            }
        }
    </style>
</head>
<body>
<div class="card">
    <!-- 语言切换栏（显示在顶部） -->
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="zh">🇨🇳 中文</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="ja">🇯🇵 日本語</button>
        <button class="lang-btn" data-lang="ko">🇰🇷 한국어</button>
        <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
        <span style="flex:1; min-width:60px;"></span>
    </div>

    <h1>📊 <span data-i18n="title">字·统·计</span></h1>
    <div class="subhead" data-i18n="subtitle">独立区分中文、英文、数字、符号 · 界面语言可切换</div>

    <div class="main-panel">
        <!-- 文本输入区 -->
        <div class="textarea-wrapper">
            <textarea id="textInput" placeholder="⏎ 请输入任意文本… 自动统计" autofocus></textarea>
        </div>

        <!-- 五项主要分类：中文 / 英文 / 全球其他语言 / 数字 / 符号（新增全球语言列） -->
        <div class="stat-grid">
            <div class="stat-tile">
                <div class="tile-label" data-i18n="chinese">🇨🇳 中文</div>
                <div class="tile-number" id="chineseCount">0</div>
                <span class="tile-unit" data-i18n="char">字</span>
            </div>
            <div class="stat-tile">
                <div class="tile-label" data-i18n="english">🔤 英文</div>
                <div class="tile-number" id="englishCount">0</div>
                <span class="tile-unit" data-i18n="letter">字母</span>
            </div>
            <div class="stat-tile">
                <div class="tile-label" data-i18n="world">🌍 全球语言</div>
                <div class="tile-number" id="worldLangCount">0</div>
                <span class="tile-unit" data-i18n="char">字</span>
            </div>
            <div class="stat-tile">
                <div class="tile-label" data-i18n="digit">🔢 数字</div>
                <div class="tile-number" id="digitCount">0</div>
                <span class="tile-unit" data-i18n="num_unit">个</span>
            </div>
            <div class="stat-tile">
                <div class="tile-label" data-i18n="symbol">🔣 符号(标点)</div>
                <div class="tile-number" id="symbolCount">0</div>
                <span class="tile-unit" data-i18n="sym_unit">个</span>
            </div>
        </div>

        <!-- 总字符数 -->
        <div class="total-section">
            <span class="total-label" data-i18n="total_label">📝 总字符数 (含所有)</span>
            <span class="total-value" id="totalChars">0</span>
        </div>

        <!-- 详细统计卡片 (细分符号) 保持不变, 也带翻译 -->
        <div class="separator-detail">
            <div class="detail-item"><span class="detail-badge"><span id="enSymbolCount">0</span> <span data-i18n="enPunct">英文标点</span></span> <span class="small-note" data-i18n="enPunct_exp">. , ! ?</span></div>
            <div class="detail-item"><span class="detail-badge"><span id="zhSymbolCount">0</span> <span data-i18n="zhPunct">中文标点</span></span> <span class="small-note" data-i18n="zhPunct_exp">，。、“”</span></div>
            <div class="detail-item"><span class="detail-badge"><span id="otherSymbolCount">0</span> <span data-i18n="otherPunct">其他符号</span></span> <span class="small-note" data-i18n="otherPunct_exp">数学、货币等</span></div>
            <div style="flex:1; text-align:right;">
                <button class="reset-btn" id="resetBtn" data-i18n="reset_btn">清空</button>
            </div>
        </div>
        <div class="footnote">
            <span data-i18n="footnote">⚡ 中文汉字/英文/全球其他文字/数字/标点全独立 · 总字符数</span>
            <span style="opacity:0.6;">🔁 点击语言按钮切换界面</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const textarea = document.getElementById('textInput');
        const chineseSpan = document.getElementById('chineseCount');
        const englishSpan = document.getElementById('englishCount');
        const worldLangSpan = document.getElementById('worldLangCount');  // 全球其他语言
        const digitSpan = document.getElementById('digitCount');
        const symbolSpan = document.getElementById('symbolCount');
        const totalSpan = document.getElementById('totalChars');
        const enSymbolSpan = document.getElementById('enSymbolCount');
        const zhSymbolSpan = document.getElementById('zhSymbolCount');
        const otherSymbolSpan = document.getElementById('otherSymbolCount');
        const resetBtn = document.getElementById('resetBtn');

        // ---------- 核心统计函数 (基于字符) ----------
        function updateCounts() {
            const text = textarea.value;
            const total = text.length;

            let chinese = 0;          // 汉字 (CJK统一表意文字)
            let english = 0;           // 英文字母 A-Z a-z
            let worldOther = 0;         // 全球其他语言 (非汉字、非英文、非数字、非符号的字母/文字，如日文平假名片假名、韩文、俄文、希腊文、阿拉伯文等)
            let digits = 0;             // 数字 0-9
            let enPunct = 0;            // 英文标点半角
            let zhPunct = 0;            // 中文标点全角
            let otherSymbols = 0;        // 剩余符号(空格、换行、数学符号等)

            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                const code = ch.charCodeAt(0);

                // ----- 中文 (CJK统一汉字，扩展常用区块) -----
                if ((code >= 0x4E00 && code <= 0x9FFF) ||      // 基本区块
                    (code >= 0x3400 && code <= 0x4DBF) ||      // 扩展A
                    (code >= 0x20000 && code <= 0x2A6DF) ||    // 扩展B
                    (code >= 0x2A700 && code <= 0x2B73F) ||    // 扩展C
                    (code >= 0x2B740 && code <= 0x2B81F) ||    // 扩展D
                    (code >= 0x2B820 && code <= 0x2CEAF) ||    // 扩展E
                    (code >= 0x2CEB0 && code <= 0x2EBEF) ||    // 扩展F
                    code === 0x3007) {                         // 〇
                    chinese++;
                    continue;
                }

                // ----- 英文 (拉丁字母) -----
                if ((code >= 65 && code <= 90) || (code >= 97 && code <= 122)) {
                    english++;
                    continue;
                }

                // ----- 数字 -----
                if (code >= 48 && code <= 57) {
                    digits++;
                    continue;
                }

                // ********** 非中/英/数字，开始判断标点和全球语言 **********
                // 先判断半角英文标点
                const isEnPunct = 
                    (code >= 33 && code <= 47) ||   // ! " # $ % & ' ( ) * + , - . /
                    (code >= 58 && code <= 64) ||   // : ; < = > ? @
                    (code >= 91 && code <= 96) ||   // [ \ ] ^ _ `
                    (code >= 123 && code <= 126);    // { | } ~

                // 中文标点 (全角标点区块)
                const isZhPunct = 
                    (code >= 0x3000 && code <= 0x303F) ||    // CJK符号标点
                    (code >= 0xFF00 && code <= 0xFFEF);      // 全角ASCII兼容

                if (isEnPunct) {
                    enPunct++;
                    continue;
                } else if (isZhPunct) {
                    zhPunct++;
                    continue;
                }

                // ---------- 剩余字符：要么是全球其他语言文字，要么是杂项符号（包括空格/换行/数学符号/货币等）----------
                // 我们把「全球其他语言」定义为：其他文字的字母/音节，但不是符号。粗略通过Unicode区块判断常见文字。
                // 常用其他文字区块：日文平假名(3040-309F)、片假名(30A0-30FF)、韩文(AC00-D7AF, 1100-11FF)、俄文(0400-04FF)、希腊文(0370-03FF)、阿拉伯文(0600-06FF)、希伯来文(0590-05FF)、天城文(0900-097F)、泰文(0E00-0E7F)等等。这里尽量覆盖，便于展示。
                const isOtherLang = 
                    (code >= 0x3040 && code <= 0x30FF) ||    // 平假名、片假名
                    (code >= 0x31F0 && code <= 0x31FF) ||    // 片假名音标扩展
                    (code >= 0xAC00 && code <= 0xD7AF) ||    // 韩文音节
                    (code >= 0x1100 && code <= 0x11FF) ||    // 韩文字母
                    (code >= 0x3130 && code <= 0x318F) ||    // 韩文兼容字母
                    (code >= 0x0400 && code <= 0x04FF) ||    // 俄文/西里尔
                    (code >= 0x0500 && code <= 0x052F) ||    // 西里尔补充
                    (code >= 0x0370 && code <= 0x03FF) ||    // 希腊文
                    (code >= 0x1F00 && code <= 0x1FFF) ||    // 希腊文扩展
                    (code >= 0x0600 && code <= 0x06FF) ||    // 阿拉伯文
                    (code >= 0x0750 && code <= 0x077F) ||    // 阿拉伯文补充
                    (code >= 0x0590 && code <= 0x05FF) ||    // 希伯来文
                    (code >= 0x0900 && code <= 0x097F) ||    // 天城文
                    (code >= 0x0980 && code <= 0x09FF) ||    // 孟加拉文
                    (code >= 0x0E00 && code <= 0x0E7F) ||    // 泰文
                    (code >= 0x0E80 && code <= 0x0EFF) ||    // 老挝文
                    (code >= 0x0F00 && code <= 0x0FFF) ||    // 藏文
                    (code >= 0x10A0 && code <= 0x10FF) ||    // 格鲁吉亚文
                    (code >= 0x1200 && code <= 0x137F) ||    // 埃塞俄比亚文
                    (code >= 0x13A0 && code <= 0x13FF) ||    // 切罗基文
                    (code >= 0x1400 && code <= 0x167F) ||    // 统一加拿大音节
                    (code >= 0x1680 && code <= 0x169F) ||    // 欧甘文
                    (code >= 0x16A0 && code <= 0x16FF) ||    // 卢恩文
                    (code >= 0x1780 && code <= 0x17FF) ||    // 高棉文
                    (code >= 0x1800 && code <= 0x18AF) ||    // 蒙古文
                    (code >= 0x1E00 && code <= 0x1EFF) ||    // 拉丁扩展附加(但已过滤英文基本拉丁，这些是带符号拉丁，可以纳入「全球语言」)
                    (code >= 0x2C60 && code <= 0x2C7F) ||    // 拉丁扩展C
                    (code >= 0xA720 && code <= 0xA7FF);      // 拉丁扩展D

                if (isOtherLang) {
                    worldOther++;
                    continue;
                } else {
                    // 剩下的都是其他符号（包括空格\n\r\t、数学符号、货币、未归类符号）
                    otherSymbols++;
                    continue;
                }
            }

            // 符号总数
            const totalSymbols = enPunct + zhPunct + otherSymbols;

            // 更新界面
            chineseSpan.textContent = chinese;
            englishSpan.textContent = english;
            worldLangSpan.textContent = worldOther;   // 全球其他语言
            digitSpan.textContent = digits;
            symbolSpan.textContent = totalSymbols;
            totalSpan.textContent = total;
            enSymbolSpan.textContent = enPunct;
            zhSymbolSpan.textContent = zhPunct;
            otherSymbolSpan.textContent = otherSymbols;
        }

        // ---------- 多语言界面翻译字典 ----------
        const translations = {
            zh: {
                title: '字·统·计',
                subtitle: '独立区分中文、英文、数字、符号 · 界面语言可切换',
                chinese: '🇨🇳 中文',
                english: '🔤 英文',
                world: '🌍 全球语言',
                digit: '🔢 数字',
                symbol: '🔣 符号(标点)',
                char: '字',
                letter: '字母',
                num_unit: '个',
                sym_unit: '个',
                total_label: '📝 总字符数 (含所有)',
                enPunct: '英文标点',
                enPunct_exp: '. , ! ?',
                zhPunct: '中文标点',
                zhPunct_exp: '，。、“”',
                otherPunct: '其他符号',
                otherPunct_exp: '数学、货币等',
                reset_btn: '清空',
                footnote: '⚡ 中文汉字/英文/全球其他文字/数字/标点全独立 · 总字符数'
            },
            en: {
                title: 'CHAR·COUNTER',
                subtitle: 'Chinese / English / World / Digits / Symbols · Switchable UI',
                chinese: '🇨🇳 Chinese',
                english: '🔤 English',
                world: '🌍 World Lang',
                digit: '🔢 Digits',
                symbol: '🔣 Symbols',
                char: 'char',
                letter: 'ltr',
                num_unit: '',
                sym_unit: '',
                total_label: '📝 Total Characters',
                enPunct: 'En punct',
                enPunct_exp: '. , ! ?',
                zhPunct: 'Zh punct',
                zhPunct_exp: '，。、“”',
                otherPunct: 'Other symb',
                otherPunct_exp: 'math, currency',
                reset_btn: 'Clear',
                footnote: '⚡ Chinese / English / World / Digits / Symbols · total chars'
            },
            ja: {
                title: '文字·カウンター',
                subtitle: '中国語/英語/世界の言語/数字/記号 · 言語切替可',
                chinese: '🇨🇳 中国語',
                english: '🔤 英語',
                world: '🌍 世界の言語',
                digit: '🔢 数字',

                char: '字',

                num_unit: '',
                sym_unit: '',
                total_label: '📝 全文字数',
                enPunct: '英記号',
                enPunct_exp: '. , ! ?',
                zhPunct: '中記号',
                zhPunct_exp: '、。「」',
                otherPunct: '他記号',
                otherPunct_exp: '数学·通貨',
                reset_btn: 'クリア',
                footnote: '⚡ 中国語/英語/世界/数字/記号を独立計測'
            },
            ko: {
                title: '글자·통계',
                subtitle: '중국어/영어/세계 언어/숫자/기호 · 언어 전환 가능',
                chinese: '🇨🇳 중국어',

                footnote: '⚡ 중국어/영어/세계어/숫자/기호 독립 집계'
            },
            ru: {
                title: 'СЧЁТЧИК СИМВОЛОВ',
                subtitle: 'Китайский/Английский/Языки мира/Цифры/Символы · Смена языка',
                chinese: '🇨🇳 Китайский',

                total_label: '📝 Всего символов',
                enPunct: 'Англ пункт',
                enPunct_exp: '. , ! ?',
                zhPunct: 'Кит пункт',
                zhPunct_exp: '，。、“”',
                otherPunct: 'Др символы',
                otherPunct_exp: 'матем, валюта',
                reset_btn: 'Очистить',
                footnote: '⚡ Ки/Ан/Миp/Цифры/Cимволы раздельно'
            }
        };

        // 当前语言
        let currentLang = 'zh';

        // 应用语言到所有带 data-i18n 的元素
        function applyLanguage(lang) {
            if (!translations[lang]) lang = 'zh';
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            // 更新活跃按钮样式
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const btnLang = btn.getAttribute('data-lang');
                if (btnLang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            // placeholder 单独处理 (textarea)
            const placeholderKey = textarea.getAttribute('placeholder') ? '⏎ 请输入任意文本… 自动统计' : ''; // 但为了简单，我们固定保留原样，或者也可以翻译，但不强制
            // 可选项: 不改 placeholder 也行，保持中性。
        }

        // 绑定语言按钮
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const lang = e.target.getAttribute('data-lang');
                applyLanguage(lang);
            });
        });

        // 重置按钮
        resetBtn.addEventListener('click', function() {
            textarea.value = '';
            updateCounts();
            textarea.focus();
        });

        // 监听输入
        textarea.addEventListener('input', updateCounts);

        // 双击标题填充样例（便于测试全球语言）
        const h1 = document.querySelector('h1');
        h1.addEventListener('dblclick', function() {
            if (textarea.value === '') {
                textarea.value = 'Hello, 世界！ 2026年统计示例。平仮名：あいうえお カタカナ：アイウ 韩语: 안녕하세요 Русский: Привет, как дела?  العربية: مرحبا 混合符号：#@% 3.14 「こんにちは」';
                updateCounts();
            }
        });

        // 初始化
        updateCounts();
        applyLanguage('zh'); // 默认中文
    })();
</script>
<!-- 界面多语言切换：点击顶部语言按钮，所有标签动态翻译，统计数据不变 -->
</body>
</html>
